<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Cheer ET</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(to bottom, #0a1428 0%, #1a2a5e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
      border-radius: 24px;
    }

    .icon-circle {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, #64748b, #475569);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(100, 116, 139, 0.4);
    }
  </style>
</head>
<body class="text-white">
  <div class="max-w-md w-full">
    <div class="glass-card p-10 md:p-12 text-center">
      
      <!-- 404 Icon -->
      <div class="mx-auto mb-8 flex justify-center">
        <div class="icon-circle">
          <i class="fa-solid fa-magnifying-glass text-white text-5xl"></i>
        </div>
      </div>

      <h1 class="text-3xl md:text-4xl font-semibold tracking-tight mb-3">
        Page Not Found
      </h1>
      <p class="text-blue-100 text-[17px] leading-relaxed mb-8">
        Sorry, the page you are looking for doesn't exist or has been moved.
      </p>

      <!-- Search Input -->
      <div class="relative mb-6">
        <input type="text" id="searchInput"
               class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 text-white placeholder:text-blue-200/60 focus:outline-none focus:border-blue-500"
               placeholder="Search creators or pages...">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <a href="https://cheer-et.web.app/" 
           class="block w-full bg-white/10 hover:bg-white/20 transition-all py-4 rounded-2xl text-lg font-semibold border border-white/20">
          Go Home
        </a>
        <a href="https://cheer-et.web.app/dashboard" 
           class="block w-full bg-blue-600 hover:bg-blue-500 transition-all py-4 rounded-2xl text-lg font-semibold">
          Dashboard
        </a>
      </div>
    </div>

    <!-- Footer -->
    <p class="mt-10 text-center text-blue-200/60 text-sm">
      Cheer ET © 2026. Owned by Kayon Tech.
    </p>
  </div>

  <script>
    // Optional: Search on Enter key
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        const query = this.value.trim();
        if (query) {
          window.location.href = `https://cheer-et.web.app/${encodeURIComponent(query)}`;
        }
      }
    });
  </script>
</body>
</html>
